<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blogbejegyzés | Elite Image Kft.</title>
    <meta name="description" content="Elite Image blogbejegyzés online marketingről, tartalomgyártásról, PPC-ről és designról.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260504">
    <style>
      .article-shell { padding-top: clamp(54px, 7vw, 90px); }
      .article-layout { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: clamp(28px, 5vw, 70px); align-items: start; }
      .article-body { color: #efe5d0; font-size: clamp(1rem, 1.2vw, 1.12rem); line-height: 1.9; }
      .article-body p { margin: 0 0 1.25rem; }
      .article-body p:first-child::first-letter { color: var(--gold-bright); font-family: var(--font-display); font-size: 3.6rem; line-height: .8; float: left; padding: .18rem .45rem 0 0; }
      .article-aside { position: sticky; top: 116px; display: grid; gap: 16px; }
      .article-aside__box { border: 1px solid rgba(214,173,87,.22); border-radius: var(--radius); background: rgba(255,255,255,.045); padding: 18px; }
      .article-aside__box h2 { margin: 0 0 12px; color: var(--gold-bright); font-family: var(--font-body); font-size: .85rem; letter-spacing: .12em; text-transform: uppercase; }
      .more-posts { display: grid; gap: 12px; }
      .more-posts a { display: grid; gap: 4px; color: #fff7e6; border-bottom: 1px solid rgba(214,173,87,.12); padding-bottom: 12px; }
      .more-posts a:last-child { border-bottom: 0; padding-bottom: 0; }
      .more-posts span { color: var(--muted); font-size: .78rem; }
      .post-meta { display: flex; flex-wrap: wrap; gap: 10px 18px; color: var(--muted); font-weight: 700; }
      .post-meta span { display: inline-flex; align-items: center; gap: 8px; }
      .post-meta span::before { content: ""; width: 6px; height: 6px; border-radius: 999px; background: var(--gold); }
      @media (max-width: 980px) { .article-layout { grid-template-columns: 1fr; } .article-aside { position: static; } }
    </style>
  </head>
  <body>
    <header class="site-header"><nav class="nav" aria-label="Fő navigáció"><a class="brand" href="index.html"><span class="brand__name">Elite Image</span><span class="brand__sub">Kft.</span></a><button class="nav-toggle" type="button" aria-label="Menü megnyitása" aria-expanded="false"><span></span></button><div class="nav__links"></div></nav></header>
    <main>
      <section class="page-hero">
        <div class="section__inner">
          <span class="eyebrow" id="postCategory">Blog</span>
          <h1 id="postTitle">Blogbejegyzés betöltése...</h1>
          <p class="lead" id="postExcerpt"></p>
          <div class="post-meta" id="postMeta"></div>
        </div>
      </section>
      <section class="section article-shell">
        <div class="section__inner article-layout">
          <article class="article-body" id="postBody"></article>
          <aside class="article-aside" aria-label="Blog navigáció">
            <a class="button button--ghost" href="blog.html">Vissza a bloghoz</a>
            <div class="article-aside__box">
              <h2>További cikkek</h2>
              <div class="more-posts" id="morePosts"></div>
            </div>
          </aside>
        </div>
      </section>
    </main>
    <footer class="site-footer"></footer>
    <script src="blog-data.js?v=20260504"></script>
    <script src="blog-extra.js?v=20260519"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("cikk") || window.eliteBlogPosts?.[0]?.slug;
      const posts = window.eliteBlogPosts || [];
      const post = posts.find((item) => item.slug === slug) || posts[0];

      const setText = (id, value) => { const el = document.getElementById(id); if (el) el.textContent = value || ""; };
      if (post) {
        document.title = `${post.title} | Elite Image Blog`;
        setText("postCategory", post.category);
        setText("postTitle", post.title);
        setText("postExcerpt", post.excerpt);
        document.getElementById("postMeta").innerHTML = `<span>${post.author}</span><span>${post.date}</span><span>${post.minutes}</span>`;
        document.getElementById("postBody").innerHTML = post.body.map((paragraph) => `<p>${paragraph}</p>`).join("");
        document.getElementById("morePosts").innerHTML = posts.filter((item) => item.slug !== post.slug).slice(0, 4).map((item) => `<a href="blog-bejegyzes.html?cikk=${item.slug}"><strong>${item.title}</strong><span>${item.category} / ${item.minutes}</span></a>`).join("");
      } else {
        setText("postTitle", "Nem található blogbejegyzés");
        setText("postExcerpt", "Menj vissza a blog oldalra, és válassz egy cikket a listából.");
      }
    </script>
    <script src="script.js?v=20260504"></script>
  </body>
</html>
